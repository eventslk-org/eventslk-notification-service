<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Subject}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);">

          <!-- Header -->
          <tr>
            <td style="background-color:#1a1a2e;padding:32px 40px;text-align:center;">
              <h1 style="color:#e94560;margin:0;font-size:28px;letter-spacing:1px;">EventsLK</h1>
              <p style="color:#a0a0b0;margin:8px 0 0;font-size:14px;">Sri Lanka's Premier Event Platform</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <h2 style="color:#1a1a2e;margin:0 0 20px;font-size:22px;">{{.Subject}}</h2>
              <div style="color:#555;font-size:15px;line-height:1.7;margin:0 0 32px;">
                {{.MessageBody}}
              </div>

              {{if .CtaLink}}
              <!-- CTA Button -->
              <table cellpadding="0" cellspacing="0" style="margin:0 auto 32px;">
                <tr>
                  <td style="background-color:#e94560;border-radius:6px;">
                    <a href="{{.CtaLink}}"
                       style="display:inline-block;padding:14px 32px;color:#ffffff;text-decoration:none;font-size:15px;font-weight:bold;">
                      Explore Now
                    </a>
                  </td>
                </tr>
              </table>
              {{end}}

              <hr style="border:none;border-top:1px solid #eee;margin:0 0 24px;" />
              <p style="color:#aaa;font-size:12px;text-align:center;margin:0;">
                You are receiving this email because you are registered on EventsLK.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f9f9f9;padding:20px 40px;text-align:center;">
              <p style="color:#bbb;font-size:12px;margin:0;">
                &copy; 2025 EventsLK &nbsp;|&nbsp; noreply@eventslk.lk
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
